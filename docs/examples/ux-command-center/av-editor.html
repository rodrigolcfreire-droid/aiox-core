<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Editor Growth — Centro de Comando</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0e1a;color:#e2e8f0;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}

    /* ── Header ── */
    .header{padding:16px 40px;border-bottom:1px solid #1e293b;display:flex;align-items:center;justify-content:space-between;background:rgba(10,14,26,0.95);position:sticky;top:0;z-index:50;backdrop-filter:blur(8px)}
    .header-left{display:flex;align-items:center;gap:16px}
    .back-btn{background:none;border:1px solid #334155;color:#94a3b8;width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;text-decoration:none}
    .back-btn:hover{border-color:#38bdf8;color:#38bdf8}
    .header h1{font-family:'Chakra Petch';font-size:22px;font-weight:700;background:linear-gradient(135deg,#34d399,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .breadcrumb{font-size:12px;color:#64748b;margin-top:2px}
    .breadcrumb a{color:#64748b;text-decoration:none}
    .breadcrumb a:hover{color:#e2e8f0}
    .breadcrumb .sep{margin:0 6px}

    /* ── Toast ── */
    .toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
    .toast{padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;animation:slideInToast .3s ease;opacity:1;transition:opacity .3s}
    .toast-success{background:#34d399;color:#0a0e1a}
    .toast-error{background:#ef4444;color:#fff}
    .toast-info{background:#38bdf8;color:#0a0e1a}
    @keyframes slideInToast{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

    /* ── Empty State ── */
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 70px);padding:40px}
    .empty-state.hidden{display:none}
    .dropzone{width:100%;max-width:600px;border:2px dashed #334155;border-radius:16px;padding:60px 40px;text-align:center;cursor:pointer;transition:all .3s}
    .dropzone:hover,.dropzone.dragover{border-color:#38bdf8;background:rgba(56,189,248,0.05)}
    .dropzone-icon{font-size:48px;margin-bottom:16px;opacity:0.6}
    .dropzone-title{font-family:'Chakra Petch';font-size:20px;font-weight:700;margin-bottom:8px}
    .dropzone-sub{font-size:13px;color:#64748b;margin-bottom:24px}
    .dropzone input[type=file]{display:none}
    .btn{border:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
    .btn:hover{transform:scale(1.03)}
    .btn-primary{background:linear-gradient(135deg,#34d399,#38bdf8);color:#0a0e1a}
    .btn-secondary{background:#1e293b;color:#94a3b8;border:1px solid #334155}
    .btn-secondary:hover{color:#e2e8f0}
    .btn-green{background:#34d399;color:#0a0e1a}
    .btn-danger{background:#ef4444;color:#fff}
    .empty-divider{display:flex;align-items:center;gap:16px;margin:24px 0;width:100%;max-width:600px}
    .empty-divider hr{flex:1;border:none;border-top:1px solid #1e293b}
    .empty-divider span{font-size:12px;color:#475569;text-transform:uppercase;letter-spacing:1px}

    /* ── Edits List ── */
    .edits-list{width:100%;max-width:600px}
    .edits-list-title{font-size:14px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
    .edit-item{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
    .edit-item:hover{border-color:#38bdf8;background:rgba(56,189,248,0.04)}
    .edit-item-info{flex:1}
    .edit-item-name{font-size:14px;font-weight:600}
    .edit-item-meta{font-size:11px;color:#64748b;margin-top:4px;font-family:'JetBrains Mono'}
    .edit-item-arrow{color:#475569;font-size:18px}

    /* ── Transcribing State ── */
    .transcribing-state{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 70px);padding:40px}
    .transcribing-state.visible{display:flex}
    .transcribing-spinner{width:48px;height:48px;border:3px solid #1e293b;border-top-color:#38bdf8;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .transcribing-label{font-family:'Chakra Petch';font-size:18px;margin-bottom:12px}
    .progress-bar{width:300px;height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
    .progress-bar-fill{height:100%;background:linear-gradient(90deg,#38bdf8,#34d399);border-radius:3px;width:0%;transition:width .3s}

    /* ── Editor Layout ── */
    .editor{display:none;height:calc(100vh - 70px)}
    .editor.visible{display:grid;grid-template-columns:1fr 380px;grid-template-rows:1fr auto}

    /* ── Player Panel ── */
    .player-panel{position:relative;background:#000;display:flex;flex-direction:column;overflow:hidden}
    .video-wrapper{flex:1;position:relative;display:flex;align-items:center;justify-content:center;min-height:0}
    .video-wrapper video{max-width:100%;max-height:100%;display:block;object-fit:contain}

    /* ── Subtitle Overlay ── */
    .subtitle-overlay{position:absolute;left:0;right:0;pointer-events:none;display:flex;justify-content:center;padding:0 20px;z-index:5}
    .subtitle-overlay.pos-top{top:40px;align-items:flex-start}
    .subtitle-overlay.pos-center{top:50%;transform:translateY(-50%);align-items:center}
    .subtitle-overlay.pos-bottom,.subtitle-overlay.pos-center-bottom{bottom:60px;align-items:flex-end}
    .subtitle-text{text-align:center;max-width:90%;line-height:1.3;white-space:pre-wrap;word-break:break-word}
    .subtitle-text.hidden{display:none}

    /* ── Subtitle Animations ── */
    @keyframes subtitlePop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
    @keyframes subtitleFade{from{opacity:0}to{opacity:1}}
    .anim-pop{animation:subtitlePop .25s ease-out forwards}
    .anim-fade{animation:subtitleFade .3s ease-out forwards}

    /* ── Video Controls ── */
    .video-controls{display:flex;align-items:center;gap:12px;padding:10px 16px;background:rgba(15,23,42,0.95);border-top:1px solid #1e293b}
    .ctrl-btn{background:none;border:none;color:#e2e8f0;cursor:pointer;font-size:18px;padding:4px 8px;border-radius:4px;transition:background .2s}
    .ctrl-btn:hover{background:rgba(255,255,255,0.1)}
    .time-display{font-family:'JetBrains Mono';font-size:12px;color:#94a3b8;white-space:nowrap}
    .speed-select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:4px;padding:4px 8px;font-size:12px;cursor:pointer}

    /* ── Timeline ── */
    .timeline{padding:8px 16px 12px;background:rgba(15,23,42,0.95);border-top:1px solid #1e293b}
    .timeline-bar{position:relative;height:28px;background:#1e293b;border-radius:4px;cursor:pointer;user-select:none}
    .timeline-progress{position:absolute;top:0;left:0;height:100%;background:rgba(56,189,248,0.25);border-radius:4px;pointer-events:none}
    .timeline-playhead{position:absolute;top:-2px;width:3px;height:32px;background:#38bdf8;border-radius:2px;pointer-events:none;z-index:3;transition:left 0.05s linear}
    .trim-handle{position:absolute;top:0;width:8px;height:100%;cursor:ew-resize;z-index:4;border-radius:2px}
    .trim-handle-in{background:rgba(52,211,153,0.8);left:0}
    .trim-handle-out{background:rgba(239,68,68,0.8);right:0}
    .trim-region{position:absolute;top:0;height:100%;background:rgba(56,189,248,0.1);border-left:2px solid #34d399;border-right:2px solid #ef4444;pointer-events:none;z-index:2}
    .timeline-info{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:#64748b;font-family:'JetBrains Mono'}

    /* ── Sidebar ── */
    .sidebar{display:flex;flex-direction:column;border-left:1px solid #1e293b;background:#0a0e1a;overflow:hidden}
    .sidebar-tabs{display:flex;border-bottom:1px solid #1e293b;flex-shrink:0}
    .sidebar-tab{flex:1;padding:14px;text-align:center;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent}
    .sidebar-tab:hover{color:#e2e8f0}
    .sidebar-tab.active{color:#38bdf8;border-bottom-color:#38bdf8}
    .sidebar-content{flex:1;overflow-y:auto;padding:16px}
    .tab-content{display:none}
    .tab-content.active{display:block}

    /* ── Transcript List ── */
    .transcript-segment{padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .2s;margin-bottom:4px;position:relative}
    .transcript-segment:hover{background:rgba(56,189,248,0.06)}
    .transcript-segment.active{background:rgba(56,189,248,0.1);border-left:3px solid #38bdf8}
    .transcript-time{font-family:'JetBrains Mono';font-size:10px;color:#475569;margin-bottom:4px}
    .transcript-text{font-size:13px;color:#cbd5e1;line-height:1.5;outline:none}
    .transcript-text[contenteditable=true]{border:1px solid #334155;border-radius:4px;padding:4px 6px;background:rgba(30,41,59,0.5)}
    .transcript-text[contenteditable=true]:focus{border-color:#38bdf8}
    .edited-badge{display:none;font-size:9px;background:rgba(251,191,36,0.15);color:#fbbf24;padding:2px 6px;border-radius:4px;margin-left:8px}
    .edited-badge.visible{display:inline}
    .transcript-edit-btn{position:absolute;top:10px;right:8px;background:none;border:none;color:#475569;cursor:pointer;font-size:14px;opacity:0;transition:opacity .2s}
    .transcript-segment:hover .transcript-edit-btn{opacity:1}

    /* ── Presets Gallery ── */
    .presets-filter{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
    .presets-filter-btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
    .presets-filter-btn:hover{color:#e2e8f0}
    .presets-filter-btn.active{background:rgba(56,189,248,0.15);border-color:#38bdf8;color:#38bdf8}
    .preset-card{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;margin-bottom:8px}
    .preset-card:hover{border-color:#38bdf8;background:rgba(56,189,248,0.04)}
    .preset-card.active{border-color:#34d399;box-shadow:0 0 12px rgba(52,211,153,0.15)}
    .preset-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .preset-card-name{font-size:13px;font-weight:600}
    .preset-card-expert{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600}
    .expert-iristhaize{background:rgba(244,114,182,0.12);color:#f472b6}
    .expert-caio-roleta{background:rgba(251,191,36,0.12);color:#fbbf24}
    .expert-shared{background:rgba(148,163,184,0.12);color:#94a3b8}
    .preset-preview{border-radius:6px;padding:12px;text-align:center;min-height:48px;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .preset-preview-text{line-height:1.2}

    /* ── Action Bar ── */
    .action-bar{grid-column:1 / -1;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(15,23,42,0.95);border-top:1px solid #1e293b}
    .action-bar-left{display:flex;gap:12px;align-items:center}
    .action-bar-right{display:flex;gap:12px;align-items:center}
    .export-progress{display:none;align-items:center;gap:12px}
    .export-progress.visible{display:flex}
    .export-progress-bar{width:200px;height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
    .export-progress-fill{height:100%;background:linear-gradient(90deg,#34d399,#38bdf8);border-radius:3px;width:0%;transition:width .3s}
    .export-progress-label{font-size:12px;color:#94a3b8;font-family:'JetBrains Mono'}

    /* ── Skeleton loading ── */
    .skeleton{background:linear-gradient(90deg,#1e293b 25%,#334155 50%,#1e293b 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* ── Responsive ── */
    @media(max-width:1024px){
      .editor.visible{grid-template-columns:1fr 320px}
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <a href="index.html" class="back-btn" title="Voltar">&larr;</a>
      <div>
        <h1>EDITOR GROWTH</h1>
        <div class="breadcrumb">
          <a href="index.html">Centro de Comando</a>
          <span class="sep">&rsaquo;</span>
          <a href="index.html" onclick="event.preventDefault(); history.back();">Audiovisual</a>
          <span class="sep">&rsaquo;</span>
          <span style="color:#e2e8f0">Editor Growth</span>
        </div>
      </div>
    </div>
    <div id="headerStatus" style="font-size:12px;color:#64748b;font-family:'JetBrains Mono'"></div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ═══ Empty State ═══ -->
  <div class="empty-state" id="emptyState">
    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">&#127909;</div>
      <div class="dropzone-title">SUBIR VIDEO</div>
      <div class="dropzone-sub">Arraste o video aqui ou clique para selecionar</div>
      <input type="file" id="fileInput" accept="video/*">
      <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">SELECIONAR ARQUIVO</button>
    </div>

    <div class="empty-divider"><hr><span>ou</span><hr></div>

    <button class="btn btn-secondary" onclick="loadEditsList()" id="openExistingBtn">ABRIR EDIT EXISTENTE</button>

    <div class="edits-list" id="editsList" style="display:none;margin-top:24px">
      <div class="edits-list-title">Edits Existentes</div>
      <div id="editsListContent"></div>
    </div>
  </div>

  <!-- ═══ Transcribing State ═══ -->
  <div class="transcribing-state" id="transcribingState">
    <div class="transcribing-spinner"></div>
    <div class="transcribing-label">Transcrevendo...</div>
    <div class="progress-bar"><div class="progress-bar-fill" id="transcribeProgress"></div></div>
    <div style="font-size:12px;color:#64748b;margin-top:12px" id="transcribeStatus">Aguardando processamento</div>
  </div>

  <!-- ═══ Editor ═══ -->
  <div class="editor" id="editorView">
    <!-- Player Panel -->
    <div class="player-panel">
      <div class="video-wrapper" id="videoWrapper">
        <video id="videoPlayer" preload="metadata"></video>
        <!-- Subtitle Overlay -->
        <div class="subtitle-overlay pos-center-bottom" id="subtitleOverlay">
          <div class="subtitle-text hidden" id="subtitleText"></div>
        </div>
      </div>
      <!-- Video Controls -->
      <div class="video-controls">
        <button class="ctrl-btn" id="playBtn" title="Play/Pause">&#9654;</button>
        <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
        <div style="flex:1"></div>
        <select class="speed-select" id="speedSelect">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
      </div>
      <!-- Timeline -->
      <div class="timeline">
        <div class="timeline-bar" id="timelineBar">
          <div class="trim-region" id="trimRegion"></div>
          <div class="timeline-progress" id="timelineProgress"></div>
          <div class="timeline-playhead" id="timelinePlayhead"></div>
          <div class="trim-handle trim-handle-in" id="trimIn" title="Trim In"></div>
          <div class="trim-handle trim-handle-out" id="trimOut" title="Trim Out"></div>
        </div>
        <div class="timeline-info">
          <span>IN: <span id="trimInLabel">0:00.0</span></span>
          <span>OUT: <span id="trimOutLabel">--</span></span>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-tabs">
        <div class="sidebar-tab active" data-tab="legendas" onclick="switchTab('legendas')">Legendas</div>
        <div class="sidebar-tab" data-tab="presets" onclick="switchTab('presets')">Presets</div>
      </div>
      <div class="sidebar-content">
        <!-- Tab: Legendas -->
        <div class="tab-content active" id="tabLegendasContent">
          <div id="transcriptList"></div>
        </div>
        <!-- Tab: Presets -->
        <div class="tab-content" id="tabPresetsContent">
          <div class="presets-filter" id="presetsFilter"></div>
          <div id="presetsList"></div>
        </div>
      </div>
    </div>

    <!-- Action Bar -->
    <div class="action-bar">
      <div class="action-bar-left">
        <button class="btn btn-secondary" onclick="resetToEmpty()">Novo Edit</button>
        <span style="font-size:12px;color:#475569;font-family:'JetBrains Mono'" id="editIdLabel"></span>
      </div>
      <div class="action-bar-right">
        <div class="export-progress" id="exportProgress">
          <div class="export-progress-bar"><div class="export-progress-fill" id="exportProgressFill"></div></div>
          <span class="export-progress-label" id="exportProgressLabel">0%</span>
        </div>
        <button class="btn btn-green" id="exportBtn" onclick="startExport()">EXPORTAR</button>
      </div>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════════════════════════════════
       Editor Growth — Vanilla JS Controller
       Story: EG-4
       ═══════════════════════════════════════════════════════════ */

    // ── Configuration ──
    const API_BASE = window.location.origin;
    const AUTH_HEADER = () => ({
      'Authorization': 'Bearer ' + (sessionStorage.getItem('aios_token') || '')
    });

    // ── State ──
    let currentEdit = null;
    let presets = [];
    let activePreset = null;
    let editedSegments = new Set();
    let rafId = null;

    // ── Helpers ──
    function formatTime(sec) {
      if (!sec || isNaN(sec)) return '0:00';
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return m + ':' + String(s).padStart(2, '0');
    }

    function formatTimePrecise(sec) {
      if (!sec || isNaN(sec)) return '0:00.0';
      const m = Math.floor(sec / 60);
      const s = (sec % 60).toFixed(1);
      return m + ':' + (parseFloat(s) < 10 ? '0' : '') + s;
    }

    function showToast(msg, type) {
      type = type || 'info';
      var container = document.getElementById('toastContainer');
      var t = document.createElement('div');
      t.className = 'toast toast-' + type;
      t.textContent = msg;
      container.appendChild(t);
      setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 300); }, 3000);
    }

    async function apiFetch(path, options) {
      options = options || {};
      options.headers = Object.assign({}, AUTH_HEADER(), options.headers || {});
      try {
        var res = await fetch(API_BASE + path, options);
        if (!res.ok) {
          var errBody = '';
          try { errBody = await res.text(); } catch(e) {}
          throw new Error('HTTP ' + res.status + (errBody ? ': ' + errBody : ''));
        }
        return res;
      } catch (err) {
        showToast(err.message, 'error');
        throw err;
      }
    }

    // ── View Switching ──
    function showView(viewId) {
      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('transcribingState').classList.remove('visible');
      document.getElementById('editorView').classList.remove('visible');
      if (viewId === 'empty') {
        document.getElementById('emptyState').classList.remove('hidden');
      } else if (viewId === 'transcribing') {
        document.getElementById('transcribingState').classList.add('visible');
      } else if (viewId === 'editor') {
        document.getElementById('editorView').classList.add('visible');
      }
    }

    function resetToEmpty() {
      currentEdit = null;
      activePreset = null;
      editedSegments.clear();
      if (rafId) cancelAnimationFrame(rafId);
      var video = document.getElementById('videoPlayer');
      video.pause();
      video.removeAttribute('src');
      video.load();
      document.getElementById('editsList').style.display = 'none';
      document.getElementById('headerStatus').textContent = '';
      showView('empty');
    }

    // ── Drag & Drop + File Upload ──
    (function initDropzone() {
      var dz = document.getElementById('dropzone');
      var fi = document.getElementById('fileInput');

      dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('dragover'); });
      dz.addEventListener('dragleave', function() { dz.classList.remove('dragover'); });
      dz.addEventListener('drop', function(e) {
        e.preventDefault();
        dz.classList.remove('dragover');
        var files = e.dataTransfer.files;
        if (files.length > 0 && files[0].type.startsWith('video/')) {
          uploadVideo(files[0]);
        } else {
          showToast('Por favor, selecione um arquivo de video.', 'error');
        }
      });

      fi.addEventListener('change', function() {
        if (fi.files.length > 0) uploadVideo(fi.files[0]);
      });
    })();

    async function uploadVideo(file) {
      showView('transcribing');
      document.getElementById('transcribeStatus').textContent = 'Enviando ' + file.name + '...';
      document.getElementById('transcribeProgress').style.width = '10%';

      var formData = new FormData();
      formData.append('source', file);
      formData.append('projectId', 'standalone');

      try {
        var res = await fetch(API_BASE + '/api/edit/create', {
          method: 'POST',
          headers: AUTH_HEADER(),
          body: formData
        });
        if (!res.ok) throw new Error('Upload falhou: HTTP ' + res.status);
        var edit = await res.json();
        document.getElementById('transcribeProgress').style.width = '40%';
        document.getElementById('transcribeStatus').textContent = 'Processando transcricao...';
        pollForTranscript(edit.editId);
      } catch (err) {
        showToast('Erro no upload: ' + err.message, 'error');
        showView('empty');
      }
    }

    async function pollForTranscript(editId) {
      var attempts = 0;
      var maxAttempts = 120;
      var interval = setInterval(async function() {
        attempts++;
        var pct = Math.min(40 + (attempts / maxAttempts) * 55, 95);
        document.getElementById('transcribeProgress').style.width = pct + '%';

        try {
          var res = await apiFetch('/api/edit/' + editId);
          var edit = await res.json();
          if (edit.transcript && edit.transcript.length > 0) {
            clearInterval(interval);
            document.getElementById('transcribeProgress').style.width = '100%';
            document.getElementById('transcribeStatus').textContent = 'Transcricao concluida!';
            setTimeout(function() { openEdit(edit); }, 500);
            return;
          }
          if (attempts >= maxAttempts) {
            clearInterval(interval);
            // Open anyway with empty transcript
            openEdit(edit);
          }
        } catch (err) {
          clearInterval(interval);
          showToast('Erro ao verificar transcricao', 'error');
          showView('empty');
        }
      }, 2000);
    }

    // ── Load Edits List ──
    async function loadEditsList() {
      var listEl = document.getElementById('editsList');
      var content = document.getElementById('editsListContent');
      listEl.style.display = 'block';
      content.innerHTML = '<div class="skeleton" style="height:60px;margin-bottom:8px"></div><div class="skeleton" style="height:60px;margin-bottom:8px"></div>';

      try {
        var res = await apiFetch('/api/edit/list');
        var edits = await res.json();
        if (!edits || edits.length === 0) {
          content.innerHTML = '<div style="text-align:center;color:#475569;padding:24px;">Nenhum edit encontrado.</div>';
          return;
        }
        content.innerHTML = '';
        edits.forEach(function(edit) {
          var item = document.createElement('div');
          item.className = 'edit-item';
          item.onclick = function() { loadExistingEdit(edit.editId); };
          var source = edit.sourceVideo || 'Video';
          if (source.length > 40) source = '...' + source.slice(-37);
          item.innerHTML =
            '<div class="edit-item-info">' +
              '<div class="edit-item-name">' + (edit.presetId || source) + '</div>' +
              '<div class="edit-item-meta">' + edit.editId.slice(0, 8) + ' &middot; ' + edit.status + ' &middot; ' + new Date(edit.createdAt).toLocaleDateString('pt-BR') + '</div>' +
            '</div>' +
            '<div class="edit-item-arrow">&rarr;</div>';
          content.appendChild(item);

    async function loadExistingEdit(editId) {
      showView('transcribing');
      document.getElementById('transcribeStatus').textContent = 'Carregando edit...';
      document.getElementById('transcribeProgress').style.width = '50%';

      try {
        var res = await apiFetch('/api/edit/' + editId);
        var edit = await res.json();
        document.getElementById('transcribeProgress').style.width = '100%';
        setTimeout(function() { openEdit(edit); }, 300);
      } catch (err) {
        showToast('Erro ao carregar edit', 'error');

      }

    // ── Open Edit in Editor ──
    function openEdit(edit) {
      currentEdit = edit;
      editedSegments.clear();
      showView('editor');

      // Set video source
      var video = document.getElementById('videoPlayer');
      var source = edit.sourceVideo;
      // For standalone uploads, the source is an absolute path — use API proxy if needed
      // If it starts with http, use directly; otherwise try relative or API
      if (source && (source.startsWith('http://') || source.startsWith('https://'))) {
        video.src = source;
      } else {
        // Attempt to use a URL-friendly version (server should serve the file)
        video.src = API_BASE + '/api/edit/' + edit.editId + '/source';
      }

      video.load();
      document.getElementById('editIdLabel').textContent = 'ID: ' + edit.editId.slice(0, 8);
      document.getElementById('headerStatus').textContent = edit.status.toUpperCase();

      // Load presets
      loadPresets();

      // If edit has a preset, apply it
      if (edit.presetId) {
        // Wait for presets to load, then apply
        setTimeout(function() { selectPreset(edit.presetId); }, 500);
      }

      // Render transcript
      renderTranscript(edit.transcript || []);

      // Setup trim
      setupTrim(edit.trim || { in: 0, out: null });

      // Start subtitle sync loop
      startSubtitleSync();

      // Setup export button state
      updateExportButton();
    }

    // ── Video Player ──
    (function initPlayer() {
      var video = document.getElementById('videoPlayer');
      var playBtn = document.getElementById('playBtn');
      var speedSelect = document.getElementById('speedSelect');

      playBtn.addEventListener('click', function() {
        if (video.paused) { video.play(); } else { video.pause(); }
      });

      video.addEventListener('play', function() { playBtn.innerHTML = '&#9646;&#9646;'; });
      video.addEventListener('pause', function() { playBtn.innerHTML = '&#9654;'; });

      video.addEventListener('timeupdate', function() {
        document.getElementById('timeDisplay').textContent =
          formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
        updateTimeline();
      });

      video.addEventListener('loadedmetadata', function() {
        document.getElementById('timeDisplay').textContent =
          '0:00 / ' + formatTime(video.duration);
        if (currentEdit && (currentEdit.trim.out === null || currentEdit.trim.out === 0)) {
          currentEdit.trim.out = video.duration;
          updateTrimDisplay();
        }
      });

      speedSelect.addEventListener('change', function() {
        video.playbackRate = parseFloat(speedSelect.value);
      });
    })();

    // ── Timeline ──
    (function initTimeline() {
      var bar = document.getElementById('timelineBar');
      var video = document.getElementById('videoPlayer');

      bar.addEventListener('click', function(e) {
        if (e.target.classList.contains('trim-handle')) return;
        var rect = bar.getBoundingClientRect();
        var pct = (e.clientX - rect.left) / rect.width;
        var time = pct * (video.duration || 0);
        video.currentTime = time;
      });

      // Trim handle dragging
      initTrimDrag('trimIn', 'in');
      initTrimDrag('trimOut', 'out');
    })();

    function initTrimDrag(handleId, type) {
      var handle = document.getElementById(handleId);
      var bar = document.getElementById('timelineBar');
      var video = document.getElementById('videoPlayer');
      var dragging = false;

      handle.addEventListener('mousedown', function(e) {
        e.preventDefault();
        e.stopPropagation();
        dragging = true;
      });

      document.addEventListener('mousemove', function(e) {
        if (!dragging || !currentEdit) return;
        var rect = bar.getBoundingClientRect();
        var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        var time = pct * (video.duration || 0);

        if (type === 'in') {
          currentEdit.trim.in = Math.min(time, (currentEdit.trim.out || video.duration) - 0.5);
        } else {
          currentEdit.trim.out = Math.max(time, currentEdit.trim.in + 0.5);
        }
        updateTrimDisplay();
      });

      document.addEventListener('mouseup', function() {
        if (dragging && currentEdit) {
          dragging = false;
          saveTrim();
        }
      });
    }

    function updateTimeline() {
      var video = document.getElementById('videoPlayer');
      if (!video.duration) return;
      var pct = (video.currentTime / video.duration) * 100;
      document.getElementById('timelineProgress').style.width = pct + '%';
      document.getElementById('timelinePlayhead').style.left = 'calc(' + pct + '% - 1.5px)';
    }

    function setupTrim(trim) {
      if (!currentEdit) return;
      currentEdit.trim = trim;
      updateTrimDisplay();
    }

    function updateTrimDisplay() {
      var video = document.getElementById('videoPlayer');
      var dur = video.duration || 1;
      var trimIn = currentEdit ? currentEdit.trim.in : 0;
      var trimOut = currentEdit ? (currentEdit.trim.out || dur) : dur;

      var pctIn = (trimIn / dur) * 100;
      var pctOut = (trimOut / dur) * 100;

      document.getElementById('trimIn').style.left = pctIn + '%';
      document.getElementById('trimOut').style.left = pctOut + '%';
      document.getElementById('trimRegion').style.left = pctIn + '%';
      document.getElementById('trimRegion').style.width = (pctOut - pctIn) + '%';

      document.getElementById('trimInLabel').textContent = formatTimePrecise(trimIn);
      document.getElementById('trimOutLabel').textContent = formatTimePrecise(trimOut);
    }

    async function saveTrim() {
      if (!currentEdit) return;
      try {
        await apiFetch('/api/edit/' + currentEdit.editId + '/trim', {
          method: 'PUT',
          headers: Object.assign({ 'Content-Type': 'application/json' }, AUTH_HEADER()),
          body: JSON.stringify({ in: currentEdit.trim.in, out: currentEdit.trim.out })
        });
      } catch (err) { /* toast already shown */ }
    }

    // ── Transcript Rendering ──
    function renderTranscript(transcript) {
      var list = document.getElementById('transcriptList');
      if (!transcript || transcript.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:#475569;padding:40px;font-size:13px;">Sem transcricao disponivel.</div>';
        return;
      }
      list.innerHTML = '';
      transcript.forEach(function(seg, idx) {
        var el = document.createElement('div');
        el.className = 'transcript-segment';
        el.dataset.index = idx;

        var startTime = seg.start || seg.startTime || 0;
        var endTime = seg.end || seg.endTime || 0;
        var text = seg.text || seg.word || '';

        el.innerHTML =
          '<div class="transcript-time">' + formatTimePrecise(startTime) + ' - ' + formatTimePrecise(endTime) +
            '<span class="edited-badge" id="editBadge' + idx + '">editado</span>' +
          '</div>' +
          '<div class="transcript-text" id="segText' + idx + '">' + escapeHtml(text) + '</div>' +
          '<button class="transcript-edit-btn" onclick="startEditSegment(event, ' + idx + ')" title="Editar">&#9998;</button>';

        el.addEventListener('click', function(e) {
          if (e.target.classList.contains('transcript-edit-btn') || e.target.getAttribute('contenteditable') === 'true') return;
          var video = document.getElementById('videoPlayer');
          video.currentTime = startTime;
          video.play();
        });

        list.appendChild(el);
      });
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function startEditSegment(e, idx) {
      e.stopPropagation();
      var textEl = document.getElementById('segText' + idx);
      textEl.setAttribute('contenteditable', 'true');
      textEl.focus();

      // Select all text
      var range = document.createRange();
      range.selectNodeContents(textEl);
      var sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);

      textEl.addEventListener('blur', function handler() {
        textEl.removeAttribute('contenteditable');
        textEl.removeEventListener('blur', handler);
        saveSegmentEdit(idx, textEl.textContent);
      }, { once: true });

      textEl.addEventListener('keydown', function handler(ev) {
        if (ev.key === 'Enter') {
          ev.preventDefault();
          textEl.blur();
        }
      });
    }

    async function saveSegmentEdit(idx, newText) {
      if (!currentEdit || !currentEdit.transcript) return;
      var seg = currentEdit.transcript[idx];
      if (!seg) return;
      var oldText = seg.text || seg.word || '';
      if (newText === oldText) return;

      // Update local state
      if (seg.text !== undefined) seg.text = newText;
      else seg.word = newText;

      editedSegments.add(idx);
      var badge = document.getElementById('editBadge' + idx);
      if (badge) badge.classList.add('visible');

      try {
        await apiFetch('/api/edit/' + currentEdit.editId + '/transcript', {
          method: 'PUT',
          headers: Object.assign({ 'Content-Type': 'application/json' }, AUTH_HEADER()),
          body: JSON.stringify({ index: idx, text: newText })
        });
        showToast('Legenda atualizada', 'success');
      } catch (err) { /* toast shown by apiFetch */ }
    }

    // ── Subtitle Sync via requestAnimationFrame ──
    function startSubtitleSync() {
      if (rafId) cancelAnimationFrame(rafId);
      var video = document.getElementById('videoPlayer');
      var overlay = document.getElementById('subtitleOverlay');
      var textEl = document.getElementById('subtitleText');

      function syncLoop() {
        rafId = requestAnimationFrame(syncLoop);
        if (!currentEdit || !currentEdit.transcript || currentEdit.transcript.length === 0) {
          textEl.classList.add('hidden');
          return;
        }
        if (!activePreset) {
          textEl.classList.add('hidden');
          return;
        }

        var ct = video.currentTime;
        var activeSeg = null;
        var activeIdx = -1;

        for (var i = 0; i < currentEdit.transcript.length; i++) {
          var seg = currentEdit.transcript[i];
          var start = seg.start || seg.startTime || 0;
          var end = seg.end || seg.endTime || start + 2;
          if (ct >= start && ct < end) {
            activeSeg = seg;
            activeIdx = i;
            break;
          }
        }

        // Highlight active transcript segment
        highlightTranscriptSegment(activeIdx);

        if (!activeSeg) {
          textEl.classList.add('hidden');
          return;
        }

        var text = activeSeg.text || activeSeg.word || '';
        var preset = activePreset;

        // Check for word-by-word highlight
        if (preset.highlight && preset.highlight.mode === 'word-by-word') {
          var segStart = activeSeg.start || activeSeg.startTime || 0;
          var segEnd = activeSeg.end || activeSeg.endTime || segStart + 2;
          var segDuration = segEnd - segStart;
          var elapsed = ct - segStart;
          var words = text.split(/\s+/);
          var wordDuration = segDuration / Math.max(words.length, 1);
          var currentWordIdx = Math.min(Math.floor(elapsed / wordDuration), words.length - 1);

          var html = '';
          for (var w = 0; w < words.length; w++) {
            if (w === currentWordIdx) {
              html += '<span style="background:' + (preset.highlight.color || '#FFD700') + ';color:#000;padding:2px 4px;border-radius:3px;">' + escapeHtml(words[w]) + '</span> ';
            } else {
              html += escapeHtml(words[w]) + ' ';
            }
          }
          textEl.innerHTML = html.trim();
        } else {
          textEl.textContent = text;
        }

        textEl.classList.remove('hidden');
        applyPresetToOverlay(preset);
      }
      syncLoop();
    }

    var lastHighlightedIdx = -1;
    function highlightTranscriptSegment(idx) {
      if (idx === lastHighlightedIdx) return;
      if (lastHighlightedIdx >= 0) {
        var prev = document.querySelector('.transcript-segment[data-index="' + lastHighlightedIdx + '"]');
        if (prev) prev.classList.remove('active');
      }
      if (idx >= 0) {
        var curr = document.querySelector('.transcript-segment[data-index="' + idx + '"]');
        if (curr) {
          curr.classList.add('active');
          // Scroll into view
          curr.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
      }
      lastHighlightedIdx = idx;
    }

    // ── Preset Rendering ──
    async function loadPresets() {
      try {
        var res = await apiFetch('/api/edit/presets');
        presets = await res.json();
        renderPresets(presets);
      } catch (err) {
        document.getElementById('presetsList').innerHTML = '<div style="color:#ef4444;padding:16px;">Erro ao carregar presets.</div>';
      }
    }

    function renderPresets(presetList) {
      // Build expert filter
      var experts = [];
      var expertSet = {};
      presetList.forEach(function(p) {
        if (!expertSet[p.expert]) {
          expertSet[p.expert] = true;
          experts.push(p.expert);
        }
      });

      var filterEl = document.getElementById('presetsFilter');
      filterEl.innerHTML = '<button class="presets-filter-btn active" data-expert="all" onclick="filterPresets(\'all\', this)">Todos</button>';
      var expertLabels = { 'iristhaize': 'Iris', 'caio-roleta': 'Caio', 'shared': 'Compartilhados' };
      experts.forEach(function(exp) {
        filterEl.innerHTML += '<button class="presets-filter-btn" data-expert="' + exp + '" onclick="filterPresets(\'' + exp + '\', this)">' + (expertLabels[exp] || exp) + '</button>';
      });

      renderPresetCards(presetList);
    }

    function filterPresets(expert, btnEl) {
      document.querySelectorAll('.presets-filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btnEl.classList.add('active');

      if (expert === 'all') {
        renderPresetCards(presets);
      } else {
        renderPresetCards(presets.filter(function(p) { return p.expert === expert; }));
      }
    }

    function renderPresetCards(list) {
      var container = document.getElementById('presetsList');
      container.innerHTML = '';
      list.forEach(function(p) {
        var s = p.style;
        var expertClass = 'expert-' + (p.expert || 'shared');
        var expertLabels = { 'iristhaize': 'Iris', 'caio-roleta': 'Caio', 'shared': 'Compartilhado' };
        var isActive = activePreset && activePreset.id === p.id;

        var card = document.createElement('div');
        card.className = 'preset-card' + (isActive ? ' active' : '');
        card.onclick = function() { selectPreset(p.id); };

        // Build preview style
        var previewStyle = 'background:' + (s.background || '#1e293b') + ';';
        var textStyle = 'font-family:' + s.font + ';font-size:' + Math.min(s.size, 24) + 'px;color:' + s.color + ';';
        if (s.strokeColor && s.strokeWidth) {
          textStyle += '-webkit-text-stroke:' + Math.min(s.strokeWidth, 2) + 'px ' + s.strokeColor + ';';
          textStyle += 'text-shadow:0 0 ' + s.strokeWidth + 'px ' + s.strokeColor + ';';
        }

        card.innerHTML =
          '<div class="preset-card-header">' +
            '<span class="preset-card-name">' + p.name + '</span>' +
            '<span class="preset-card-expert ' + expertClass + '">' + (expertLabels[p.expert] || p.expert) + '</span>' +
          '</div>' +
          '<div class="preset-preview" style="' + previewStyle + '">' +
            '<span class="preset-preview-text" style="' + textStyle + '">Exemplo</span>' +
          '</div>';

        container.appendChild(card);
      });
    }

    async function selectPreset(presetId) {
      var preset = presets.find(function(p) { return p.id === presetId; });
      if (!preset) return;

      activePreset = preset;

      // Update cards
      document.querySelectorAll('.preset-card').forEach(function(c) { c.classList.remove('active'); });
      // Find and highlight matching card
      renderPresetCards(
        document.querySelector('.presets-filter-btn.active').dataset.expert === 'all'
          ? presets
          : presets.filter(function(p) { return p.expert === document.querySelector('.presets-filter-btn.active').dataset.expert; })
      );

      // Apply overlay style
      applyPresetToOverlay(preset);

      // Save to API
      if (currentEdit) {
        currentEdit.presetId = presetId;
        try {
          await apiFetch('/api/edit/' + currentEdit.editId + '/preset', {
            method: 'PUT',
            headers: Object.assign({ 'Content-Type': 'application/json' }, AUTH_HEADER()),
            body: JSON.stringify({ presetId: presetId })
          });
          showToast('Preset aplicado: ' + preset.name, 'success');
        } catch (err) { /* toast from apiFetch */ }
      }
    }

    function applyPresetToOverlay(preset) {
      if (!preset) return;
      var s = preset.style;
      var overlay = document.getElementById('subtitleOverlay');
      var textEl = document.getElementById('subtitleText');

      // Position
      overlay.className = 'subtitle-overlay';
      var posMap = { 'top': 'pos-top', 'center-top': 'pos-top', 'center': 'pos-center', 'center-bottom': 'pos-center-bottom', 'bottom': 'pos-bottom' };
      overlay.classList.add(posMap[s.position] || 'pos-bottom');

      // Text style
      textEl.style.fontFamily = s.font;
      textEl.style.fontSize = s.size + 'px';
      textEl.style.color = s.color;
      textEl.style.opacity = s.opacity;

      // Stroke
      if (s.strokeColor && s.strokeWidth) {
        textEl.style.webkitTextStroke = s.strokeWidth + 'px ' + s.strokeColor;
        // Multiple text-shadow for robust outline
        var sw = s.strokeWidth;
        var sc = s.strokeColor;
        textEl.style.textShadow =
          sw + 'px ' + sw + 'px 0 ' + sc + ',' +
          (-sw) + 'px ' + sw + 'px 0 ' + sc + ',' +
          sw + 'px ' + (-sw) + 'px 0 ' + sc + ',' +
          (-sw) + 'px ' + (-sw) + 'px 0 ' + sc;
      } else {
        textEl.style.webkitTextStroke = '';
        textEl.style.textShadow = '';
      }

      // Background
      if (s.background) {
        textEl.style.backgroundColor = s.background;
        textEl.style.padding = '6px 14px';
        textEl.style.borderRadius = '4px';
      } else {
        textEl.style.backgroundColor = '';
        textEl.style.padding = '';
        textEl.style.borderRadius = '';
      }

      // Animation class
      textEl.classList.remove('anim-pop', 'anim-fade');
      if (preset.animation) {
        if (preset.animation.type === 'pop') textEl.classList.add('anim-pop');
        else if (preset.animation.type === 'fade') textEl.classList.add('anim-fade');
      }
    }

    // ── Sidebar Tab Switching ──
    function switchTab(tabId) {
      document.querySelectorAll('.sidebar-tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.tab === tabId);
      });
      document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
      document.getElementById('tab' + tabId.charAt(0).toUpperCase() + tabId.slice(1) + 'Content').classList.add('active');
    }

    // ── Export ──
    function updateExportButton() {
      var btn = document.getElementById('exportBtn');
      if (currentEdit && currentEdit.status === 'exported') {
        btn.textContent = 'BAIXAR .MP4';
        btn.className = 'btn btn-primary';
        btn.onclick = function() { downloadExport(); };
      } else {
        btn.textContent = 'EXPORTAR';
        btn.className = 'btn btn-green';
        btn.onclick = function() { startExport(); };
      }
    }

    async function startExport() {
      if (!currentEdit) return;
      var btn = document.getElementById('exportBtn');
      btn.disabled = true;
      btn.textContent = 'Renderizando...';

      var progressEl = document.getElementById('exportProgress');
      var fillEl = document.getElementById('exportProgressFill');
      var labelEl = document.getElementById('exportProgressLabel');
      progressEl.classList.add('visible');
      fillEl.style.width = '0%';
      labelEl.textContent = '0%';

      try {
        var response = await fetch(API_BASE + '/api/edit/' + currentEdit.editId + '/export', {
          method: 'POST',
          headers: Object.assign({ 'Content-Type': 'application/json' }, AUTH_HEADER()),
          body: JSON.stringify({ quality: 'high' })
        });

        // Check if SSE
        var contentType = response.headers.get('content-type') || '';
        if (contentType.includes('text/event-stream')) {
          var reader = response.body.getReader();
          var decoder = new TextDecoder();
          var buffer = '';

          while (true) {
            var chunk = await reader.read();
            if (chunk.done) break;
            buffer += decoder.decode(chunk.value, { stream: true });

            var lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (var i = 0; i < lines.length; i++) {
              var line = lines[i].trim();
              if (line.startsWith('data:')) {
                try {
                  var data = JSON.parse(line.slice(5));
                  if (data.progress !== undefined) {
                    var pct = Math.round(data.progress);
                    fillEl.style.width = pct + '%';
                    labelEl.textContent = pct + '%';
                  }
                  if (data.stage) {
                    labelEl.textContent = data.stage;
                  }
                  if (data.status === 'complete' || data.done) {
                    exportComplete();
                    return;
                  }
                  if (data.error) {
                    throw new Error(data.error);
                  }
                } catch (parseErr) {
                  // Non-JSON SSE line, skip
                }
              }
            }
          }
          // If stream ended without explicit complete
          exportComplete();
        } else {
          // Non-SSE response
          if (!response.ok) throw new Error('Export falhou: HTTP ' + response.status);
          var result = await response.json();
          fillEl.style.width = '100%';
          labelEl.textContent = '100%';
          exportComplete();
        }
      } catch (err) {
        showToast('Erro no export: ' + err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'EXPORTAR';
        progressEl.classList.remove('visible');
      }
    }

    function exportComplete() {
      var fillEl = document.getElementById('exportProgressFill');
      var labelEl = document.getElementById('exportProgressLabel');
      fillEl.style.width = '100%';
      labelEl.textContent = 'Concluido!';

      showToast('Export concluido com sucesso!', 'success');

      if (currentEdit) currentEdit.status = 'exported';

      var btn = document.getElementById('exportBtn');
      btn.disabled = false;
      btn.textContent = 'BAIXAR .MP4';
      btn.className = 'btn btn-primary';
      btn.onclick = function() { downloadExport(); };

      setTimeout(function() {
        document.getElementById('exportProgress').classList.remove('visible');
      }, 2000);
    }

    function downloadExport() {
      if (!currentEdit) return;
      window.open(API_BASE + '/api/edit/' + currentEdit.editId + '/export/download', '_blank');
    }

    // ── Init ──
    // Check URL params for direct edit loading
    (function init() {
      var params = new URLSearchParams(window.location.search);
      var editId = params.get('editId') || params.get('edit');
      if (editId) {
        loadExistingEdit(editId);
      }
    })();
  </script>
</body>
</html>
