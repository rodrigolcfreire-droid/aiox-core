squad:
  name: persona
  display_name: "Persona Squad"
  version: "1.0.0"
  domain: "Personas e Adaptação de Roteiro"
  description: |
    Squad dedicado a cruzar roteiros prontos com perfis de apostador,
    gerando versões alinhadas por estilo de decisão e comportamento.

  entry_agent: apostador-social-recreativo
  created_by: "Antigravidade"
  created_at: "2026-03-07"

tiers:
  tier_0:
    name: "Perfis de Apostador"
    agents:
      - apostador-social-recreativo
      - apostador-de-fuga
      - apostador-profissional-analitico
      - apostador-cauteloso
      - apostador-reals-bet
      - apostador-bingo-bet
    purpose: "Adaptação do roteiro por perfil comportamental"

agents:
  apostador-social-recreativo:
    file: agents/apostador-social-recreativo.md
    tier: 0
    icon: "🎉"
    focus: "Tom social, entretenimento e leveza"

  apostador-de-fuga:
    file: agents/apostador-de-fuga.md
    tier: 0
    icon: "🌪️"
    focus: "Narrativa de escape da rotina e emoção imediata"

  apostador-profissional-analitico:
    file: agents/apostador-profissional-analitico.md
    tier: 0
    icon: "📈"
    focus: "Racional, probabilidade, método e gestão"

  apostador-cauteloso:
    file: agents/apostador-cauteloso.md
    tier: 0
    icon: "🛡️"
    focus: "Segurança, limites e risco controlado"

  apostador-reals-bet:
    file: agents/apostador-reals-bet.md
    tier: 0
    icon: "💸"
    focus: "Abordagem objetiva para contexto Reals Bet"

  apostador-bingo-bet:
    file: agents/apostador-bingo-bet.md
    tier: 0
    icon: "🎯"
    focus: "Abordagem dinâmica para contexto Bingo Bet"

rules:
  persona-replication:
    name: "Regra de Replicacao de Persona"
    trigger: "after_briefing_script_generated"
    description: |
      Apos a geracao de um roteiro base pelo Squad de Briefing,
      o sistema executa um checkpoint de decisao perguntando ao usuario
      se deseja replicar o roteiro para as personas cadastradas.
    checkpoint:
      type: "user_decision"
      prompt: "Deseja replicar este roteiro para as personas cadastradas?"
      options:
        - label: "Sim, replicar para todas as personas"
          action: "replicate_all"
        - label: "Sim, selecionar personas"
          action: "replicate_selected"
        - label: "Nao, manter apenas o roteiro base"
          action: "skip"
    on_authorize:
      workflow: "wf-persona-cruzamento-roteiro"
      adaptations:
        - linguagem
        - narrativa
        - gatilhos_psicologicos
        - estilo_de_comunicacao
        - cta
      output: "Variacoes do roteiro adaptadas por persona"

settings:
  activation:
    prefix: "persona"
    example: "@persona:apostador-social-recreativo"
